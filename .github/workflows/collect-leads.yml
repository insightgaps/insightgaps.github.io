name: BD-INV-002 Lead Collector
"on":
  schedule:
    - cron: '0 0,6,12,18 * * *'
  workflow_dispatch:
jobs:
  collect-leads:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install
        run: pip install feedparser google-generativeai
      - name: Run
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python scripts/collector.py
      - name: Commit
        run: |
          git config user.email "collector@insightgaps.com"
          git config user.name "Insight Gaps Collector"
          git add data/leads.json data/cases.json
          if git diff --staged --quiet; then
            echo "No changes."
          else
            git commit -m "auto: update [BD-INV-002]"
            git push
          fi
